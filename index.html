window.toggleAccordion = function(el) {
    var accordion = el.closest('.accordion');
    if (accordion) accordion.classList.toggle('open');
};

window.toggleRefAccordion = function(el) {
    var accordion = el.closest('.ref-accordion');
    if (accordion) accordion.classList.toggle('open');
};

window.copyLine = function(btn) {
    var line = btn.closest('.text-line');
    var textElement = line.querySelector('.line-text');
    var text = textElement.textContent.trim();
    var input = textElement.querySelector('input');
    if (input) {
        text = input.value.trim() || text;
    }
    if(!text) return;
    navigator.clipboard.writeText(text).then(function() {
        var o = btn.textContent;
        btn.textContent = '✅';
        setTimeout(function() { btn.textContent = o; }, 1000);
    }).catch(function() {
        var t = document.createElement('textarea');
        t.value = text;
        document.body.appendChild(t);
        t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        var o = btn.textContent;
        btn.textContent = '✅';
        setTimeout(function() { btn.textContent = o; }, 1000);
    });
};

window.copyMacro = function(btn) {
    var code = btn.previousElementSibling?.textContent || '';
    navigator.clipboard.writeText(code).then(function() {
        window.showCopyNotification('✅ Макрос скопирован!');
    }).catch(function() {
        var t = document.createElement('textarea');
        t.value = code;
        document.body.appendChild(t);
        t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        window.showCopyNotification('✅ Макрос скопирован!');
    });
};

window.copyRefItem = function(text, btn) {
    navigator.clipboard.writeText(text).then(function() {
        var o = btn.textContent;
        btn.textContent = '✅';
        setTimeout(function() { btn.textContent = o; }, 1200);
    }).catch(function() {
        var t = document.createElement('textarea');
        t.value = text;
        document.body.appendChild(t);
        t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        var o = btn.textContent;
        btn.textContent = '✅';
        setTimeout(function() { btn.textContent = o; }, 1200);
    });
};

window.showCopyNotification = function(message) {
    var existing = document.querySelector('.copy-notification');
    if (existing) existing.remove();
    var notif = document.createElement('div');
    notif.className = 'copy-notification';
    notif.textContent = message;
    document.body.appendChild(notif);
    setTimeout(function() { notif.remove(); }, 2500);
};

window.getStatus = function(expires) {
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var expDate = new Date(expires);
    expDate.setHours(0, 0, 0, 0);
    if (expDate < today) return 'expired';
    if (expDate.getTime() === today.getTime()) return 'today';
    return 'active';
};

window.formatDate = function(dateStr) {
    if (dateStr === '9999-12-31') return '∞';
    var parts = dateStr.split('-');
    return parts[2] + '.' + parts[1] + '.' + parts[0];
};

window.escapeHtml = function(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
};

window.escapeJs = function(text) {
    return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
};

window.renderCodesTable = function() {
    var tbody = document.getElementById('codes-tbody');
    if (!tbody) return;
    var searchInput = document.getElementById('codes-search');
    var search = searchInput ? searchInput.value.toLowerCase() : '';
    var filtered = codesData;
    if (search) {
        filtered = codesData.filter(function(item) {
            return item.word.toLowerCase().includes(search) || item.template.toLowerCase().includes(search);
        });
    }
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:30px;color:#555;">🔍 Ничего не найдено</td></tr>';
        return;
    }
    var html = '';
    filtered.forEach(function(item) {
        var status = window.getStatus(item.expires);
        var formattedDate = window.formatDate(item.expires);
        var statusColor = '#66bb6a';
        var statusLabel = '';
        var rowStyle = '';
        if (status === 'expired') {
            statusColor = '#ff4444';
            statusLabel = ' ❌ ПРОСРОЧЕНО';
            rowStyle = 'style="opacity:0.6;background:#2a0a0a;"';
        } else if (status === 'today') {
            statusColor = '#ffd93d';
            statusLabel = ' ⚠️ ПОСЛЕДНИЙ ДЕНЬ';
            rowStyle = 'style="background:#2a1a0a;border-left:3px solid #ffd93d;"';
        }
        var escapedWord = window.escapeJs(item.word);
        var escapedTemplate = window.escapeJs(item.template);
        var wordDisplay = window.escapeHtml(item.word);
        var templateDisplay = window.escapeHtml(item.template);
        html += '<tr ' + rowStyle + '>' +
            '<td style="color:#666;text-align:center;">' + (codesData.indexOf(item) + 1) + '</td>' +
            '<td><div style="display:flex;align-items:center;gap:4px;"><span style="font-weight:600;color:#ff6b9d;">' + wordDisplay + '</span><button class="copy-btn-sm" onclick="window.copyRefItem(\'' + escapedWord + '\', this)" title="Копировать кодовое слово">📋</button></div><span style="color:' + statusColor + ';font-size:.7rem;display:block;margin-top:2px;">● ' + (status === 'expired' ? 'Просрочено' : status === 'today' ? 'Сегодня' : 'Активно') + '</span></td>' +
            '<td><div style="display:flex;align-items:center;gap:4px;"><span style="color:#ccc;font-size:.85rem;">' + templateDisplay + '</span><button class="copy-btn-sm" onclick="window.copyRefItem(\'' + escapedTemplate + '\', this)" title="Копировать шаблон">📋</button></div></td>' +
            '<td style="color:' + statusColor + ';font-weight:600;text-align:center;">' + formattedDate + (statusLabel ? '<div style="font-size:.65rem;font-weight:400;color:' + statusColor + ';">' + statusLabel + '</div>' : '') + '</td>' +
        '</tr>';
    });
    tbody.innerHTML = html;
};

window.filterCodes = function() {
    window.renderCodesTable();
};

var basePath = window.location.pathname.replace(/\/[^/]*$/, '/');
var pages = { 
    main: basePath + 'main.html', 
    editor: basePath + 'editor.html',
    hr: basePath + 'hr.html', 
    event: basePath + 'event.html' 
};

var currentPage = 'main';

function loadPage(page) {
    var app = document.getElementById('app');
    app.innerHTML = '<div style="text-align:center;padding:40px;color:#555;">⏳ Загрузка...</div>';
    fetch(pages[page])
        .then(function(res) {
            if (!res.ok) throw new Error('Страница не найдена (404)');
            return res.text();
        })
        .then(function(html) {
            app.innerHTML = html;
            currentPage = page;
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelector('.tab-btn[data-tab="' + page + '"]').classList.add('active');
            if (page === 'event') initEvent();
            else if (page === 'hr') initHR();
            else if (page === 'main') initMain();
            else if (page === 'editor') initEditor();
            localStorage.setItem('activeTab', page);
        })
        .catch(function(err) {
            app.innerHTML = '<div style="text-align:center;padding:40px;color:#ff6b6b;"><span style="font-size:2rem;">❌</span><p>Ошибка загрузки: ' + err.message + '</p><p style="color:#666;font-size:.85rem;margin-top:8px;">Файл ' + pages[page] + ' не найден.</p></div>';
        });
}

document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var tab = this.dataset.tab;
        if (tab && pages[tab]) loadPage(tab);
    });
});

window.addEventListener('DOMContentLoaded', function() {
    var savedTab = localStorage.getItem('activeTab') || 'main';
    document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === savedTab);
    });
    loadPage(savedTab);
});

    if(select && select.value) window.showInteractive();
}

var QUIZ_STORAGE_KEY = 'weazel_quiz_data';

window.saveQuizData = function() {
    var data = {
        name: document.getElementById('q-name')?.value || 'Викторина',
        topic: document.getElementById('q-topic')?.value || 'разные темы',
        prize: document.getElementById('q-prize')?.value || '25.000$',
        sponsor: document.getElementById('q-sponsor')?.value || '',
        questions: {},
        answers: {}
    };
    document.querySelectorAll('.q-val').forEach(function(el) {
        data.questions[el.dataset.idx] = el.value || '';
    });
    document.querySelectorAll('.a-val').forEach(function(el) {
        data.answers[el.dataset.idx] = el.value || '';
    });
    localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(data));
};

window.loadSavedQuizData = function() {
    try {
        var saved = localStorage.getItem(QUIZ_STORAGE_KEY);
        if (!saved) return;
        var data = JSON.parse(saved);
        if (data.name) { var el = document.getElementById('q-name'); if (el) el.value = data.name; }
        if (data.topic) { var el = document.getElementById('q-topic'); if (el) el.value = data.topic; }
        if (data.prize) { var el = document.getElementById('q-prize'); if (el) el.value = data.prize; }
        if (data.sponsor) { var el = document.getElementById('q-sponsor'); if (el) el.value = data.sponsor; }
        if (data.questions) {
            document.querySelectorAll('.q-val').forEach(function(el) {
                if (data.questions[el.dataset.idx] !== undefined) el.value = data.questions[el.dataset.idx];
            });
        }
        if (data.answers) {
            document.querySelectorAll('.a-val').forEach(function(el) {
                if (data.answers[el.dataset.idx] !== undefined) el.value = data.answers[el.dataset.idx];
            });
        }
    } catch(e) {}
};

window.clearQuizData = function() {
    if (!confirm('⚠️ Очистить все вопросы и ответы викторины?')) return;
    localStorage.removeItem(QUIZ_STORAGE_KEY);
    document.querySelectorAll('.q-val, .a-val').forEach(function(el) { el.value = ''; });
    document.getElementById('q-name').value = 'Викторина';
    document.getElementById('q-topic').value = 'разные темы';
    document.getElementById('q-prize').value = '25.000$';
    document.getElementById('q-sponsor').value = '';
    window.renderQuiz();
    window.showCopyNotification('🗑️ Викторина очищена!');
};

window.getLeaderboardWinner = function() {
    var inputs = document.querySelectorAll('.winner-input');
    var scores = {};

window.copyFullQuiz = function() {
    var lines = document.querySelectorAll('#quiz-text .text-line .line-text');
    var text = '';
    lines.forEach(function(el) { 
        var t = el.textContent.trim(); 
        var input = el.querySelector('input');
        if (input) {
            t = input.value.trim() || t;
        }
        if(t) text += t + '\n'; 
    });
    if(!text) return;
    navigator.clipboard.writeText(text).then(function() {
        var b = document.querySelector('.btn-pink.mt-12');
        if(b){ var o = b.textContent; b.textContent = '✅ Скопировано!'; setTimeout(function() { b.textContent = o; }, 1500); }
    }).catch(function() {
        var t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
        var b = document.querySelector('.btn-pink.mt-12');
        if(b){ var o = b.textContent; b.textContent = '✅ Скопировано!'; setTimeout(function() { b.textContent = o; }, 1500); }
    });
};

window.showInteractive = function() {
    var sel = document.getElementById('interactive-select');
    var val = sel ? sel.value : '';
    var c = document.getElementById('interactive-content');
    if(!c) return;
    if(!val){ c.innerHTML = '<div class="empty-state"><span class="big-icon">🎯</span><h3>Выберите интерактив</h3></div>'; return; }
    c.innerHTML = interactiveTexts[val] || '<div class="empty-state"><span class="big-icon">❌</span><h3>Шаблон не найден</h3></div>';
    setTimeout(function() {
        document.querySelectorAll('#interactive-content .copy-btn').forEach(function(b) {
            b.addEventListener('click', function() { window.copyLine(this); });
        });
        document.querySelectorAll('#interactive-content .accordion .arrow').forEach(function(arrow) {
            arrow.addEventListener('click', function(e) {
                e.stopPropagation();
                window.toggleAccordion(this);
            });
        });
    }, 50);
};

// ============================================================
//  ИНИЦИАЛИЗАЦИЯ EDITOR
// ============================================================
function initEditor() {
    // Рендерим таблицу и справочник сразу
    window.renderCodesTable();
    window.renderRefData();
    
    // Навешиваем обработчики на категории
    document.querySelectorAll('#editor-cats .category-btn').forEach(function(b) {
        b.addEventListener('click', function() {
            var p = this.closest('#editor-cats');
            p.querySelectorAll('.category-btn').forEach(function(x) { x.classList.remove('active'); });
            this.classList.add('active');
            var cat = this.dataset.cat;
            document.querySelectorAll('.editor-cat').forEach(function(x) { x.classList.add('hidden'); });
            document.getElementById(cat).classList.remove('hidden');
            if (cat === 'editor-codes') window.renderCodesTable();
            if (cat === 'editor-ref') window.renderRefData();
        });
    });
    
    // Навешиваем поиск
    var searchInput = document.getElementById('codes-search');
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            window.filterCodes();
        });
    }
}
