function initHR(){
document.querySelectorAll('#hr-cats .category-btn').forEach(function(b){b.addEventListener('click',function(){var p=this.closest('#hr-cats');p.querySelectorAll('.category-btn').forEach(function(x){x.classList.remove('active')});this.classList.add('active');var cat=this.dataset.cat;document.querySelectorAll('.hr-cat').forEach(function(x){x.classList.add('hidden')});document.getElementById(cat).classList.remove('hidden');localStorage.setItem('hrSubTab',cat)})});
document.querySelectorAll('.accordion .arrow').forEach(function(a){a.addEventListener('click',function(e){e.stopPropagation();window.toggleAccordion(this)})});
document.querySelectorAll('.copy-btn').forEach(function(b){b.addEventListener('click',function(){window.copyLine(this)})});
var sh=document.getElementById('startH'),sm=document.getElementById('startM'),eh=document.getElementById('endH'),em=document.getElementById('endM');
if(sh)sh.addEventListener('change',window.updateTime);if(sm)sm.addEventListener('change',window.updateTime);if(eh)eh.addEventListener('change',window.updateTime);if(em)em.addEventListener('change',window.updateTime);window.updateTime();
var s=localStorage.getItem('hrSubTab');if(s){var b=document.querySelector('#hr-cats .category-btn[data-cat="'+s+'"]');if(b)b.click()}}
window.updateTime=function(){var h1=document.getElementById('startH')?.value.padStart(2,'0')||'20',m1=document.getElementById('startM')?.value.padStart(2,'0')||'20',h2=document.getElementById('endH')?.value.padStart(2,'0')||'20',m2=document.getElementById('endM')?.value.padStart(2,'0')||'40';var lines=document.querySelectorAll('#hr-start .text-line');if(lines.length>=5){var l=lines[4].querySelector('.line-text');if(l)l.textContent='⚠️ Собеседование с '+h1+':'+m1+' до '+h2+':'+m2+'. ⚠️'}};

function initEvent(){
clearCopiedStateOnLoad();
document.querySelectorAll('#event-cats .category-btn').forEach(function(b){b.addEventListener('click',function(){var p=this.closest('#event-cats');p.querySelectorAll('.category-btn').forEach(function(x){x.classList.remove('active')});this.classList.add('active');var cat=this.dataset.cat;document.querySelectorAll('.event-cat').forEach(function(x){x.classList.add('hidden')});document.getElementById(cat).classList.remove('hidden');if(cat=='event-quiz')window.renderQuiz();if(cat=='event-interactive')window.showInteractive();localStorage.setItem('eventSubTab',cat)})});
document.querySelectorAll('.accordion .arrow').forEach(function(a){a.addEventListener('click',function(e){e.stopPropagation();window.toggleAccordion(this)})});
document.querySelectorAll('.copy-btn').forEach(function(b){b.addEventListener('click',function(){window.copyLine(this)})});
document.getElementById('interactive-select')?.addEventListener('change',window.showInteractive);
window.loadSavedQuizData();
['q-name','q-topic','q-prize','q-sponsor'].forEach(function(id){var e=document.getElementById(id);if(e)e.addEventListener('input',function(){window.saveQuizData();window.renderQuiz()})});
document.querySelectorAll('.q-val,.a-val').forEach(function(e){e.addEventListener('input',function(){window.saveQuizData()})});
document.addEventListener('input',function(e){if(e.target.classList.contains('winner-input')){window.saveQuizData();window.updateLeaderboard()}});
window.renderQuiz();window.showInteractive();
var s=localStorage.getItem('eventSubTab');if(s){var b=document.querySelector('#event-cats .category-btn[data-cat="'+s+'"]');if(b)b.click()}}
function clearCopiedStateOnLoad(){if(!sessionStorage.getItem('weazel_session_active')){localStorage.removeItem(COPIED_STATE_KEY);sessionStorage.setItem('weazel_session_active','true')}}
</script>
</body>
</html>
