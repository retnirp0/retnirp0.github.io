<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weazel News helper</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d0d;color:#e0e0e0;padding:20px}
        .container{max-width:1300px;margin:0 auto}
        header{background:linear-gradient(135deg,#1a0a0f,#2d0d1a);padding:35px;border-radius:24px;margin-bottom:30px;border:2px solid #ff2d75;text-align:center;box-shadow:0 0 60px #ff2d7520}
        header h1{font-size:2.8rem;background:linear-gradient(90deg,#ff2d75,#ff6b9d,#ff2d75);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        header p{color:#ff6b9d;margin-top:8px;font-size:1.1rem}
        .tab-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}
        .tab-btn{background:#141414;border:2px solid #2a2a2a;color:#999;padding:14px 28px;border-radius:16px;cursor:pointer;font-weight:600;transition:.3s;display:flex;align-items:center;gap:10px}
        .tab-btn:hover{background:#1f1f1f;border-color:#ff2d75;color:#fff}
        .tab-btn.active{background:#ff2d75;color:#fff;border-color:#ff2d75;box-shadow:0 0 40px #ff2d7540}
        .tab-btn .label{font-size:.75rem;color:#666;display:block;font-weight:400}
        .tab-btn.active .label{color:#ffb3cc}
        .tab-content{display:none;animation:fade .3s}
        .tab-content.active{display:block}
        @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .card{background:#141414;border-radius:20px;padding:28px;border:1px solid #2a2a2a;margin-bottom:24px;transition:.3s}
        .card:hover{border-color:#ff2d7540}
        .card h2{color:#ff2d75;font-size:1.5rem;margin-bottom:18px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #2a2a2a;padding-bottom:12px}
        .card h2 .badge{background:#ff2d7520;color:#ff6b9d;font-size:.75rem;padding:2px 14px;border-radius:20px}
        .category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
        .category-btn{background:#0d0d0d;border:2px solid #2a2a2a;border-radius:16px;padding:14px 16px;cursor:pointer;text-align:center;transition:.3s;color:#aaa;font-weight:500}
        .category-btn:hover{background:#1a1a1a;border-color:#ff2d7540;color:#fff}
        .category-btn.active{background:#ff2d7520;border-color:#ff2d75;color:#ff6b9d}
        .category-btn .cat-icon{font-size:1.6rem;display:block;margin-bottom:4px}
        .category-btn .cat-label{font-size:.8rem}
        .hidden{display:none!important}
        .level{background:#111;padding:14px 18px;border-radius:12px;margin-bottom:10px;border-left:4px solid #ff2d75}
        .level strong{color:#ff6b9d;font-size:1.05rem}
        .level .days{color:#ff2d75;font-size:.85rem;margin-left:12px;background:#ff2d7510;padding:2px 12px;border-radius:12px}
        .level ul{margin-top:6px;padding-left:20px;color:#aaa;font-size:.93rem}
        .level ul li{margin:3px 0}
        .text-block{background:#0a0a0a;border-radius:12px;border:1px solid #1f1f1f;overflow:hidden;max-height:600px;overflow-y:auto}
        .text-line{display:flex;align-items:center;gap:6px;padding:3px 6px;border-bottom:1px solid #141414;transition:.2s}
        .text-line:hover{background:#1a0a0f}
        .text-line:last-child{border-bottom:none}
        .text-line .copy-btn{background:transparent;border:none;color:#ff2d75;cursor:pointer;font-size:.8rem;padding:2px 6px;border-radius:4px;opacity:.5;flex-shrink:0;transition:.2s}
        .text-line .copy-btn:hover{background:#ff2d7520;opacity:1}
        .text-line .line-num{color:#444;font-size:.65rem;min-width:28px;text-align:right;flex-shrink:0}
        .text-line .line-text{flex:1;word-break:break-word;color:#ccc;font-size:.92rem;padding:2px 0}
        .text-line .line-text input{background:transparent;border:none;border-bottom:1px dashed #555;color:#ff6b9d;font-size:.92rem;width:auto;min-width:60px;padding:0 4px;font-family:inherit;display:inline-block}
        .text-line .line-text input:focus{outline:none;border-bottom-color:#ff2d75}
        .link-list{display:flex;flex-wrap:wrap;gap:10px}
        .link-list a{background:#111;padding:10px 20px;border-radius:12px;color:#ff6b9d;text-decoration:none;font-size:.92rem;border:1px solid #2a2a2a;transition:.3s}
        .link-list a:hover{background:#1a0a0f;border-color:#ff2d75;color:#ff2d75}
        .time-inputs{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
        .time-inputs label{color:#aaa;display:flex;align-items:center;gap:6px}
        .time-inputs input[type=number]{background:#0d0d0d;border:1px solid #2a2a2a;color:#fff;padding:10px 14px;border-radius:10px;width:70px;text-align:center;font-size:1.1rem}
        .time-inputs input[type=number]:focus{outline:none;border-color:#ff2d75}
        .time-inputs input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
        .accordion{background:#0d0d0d;border-radius:14px;border:1px solid #2a2a2a;margin-bottom:12px;overflow:hidden}
        .accordion-header{background:#1a1a1a;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;font-weight:600;color:#ddd;user-select:none}
        .accordion-header .arrow{
            display:inline-block;
            transition:transform .3s ease;
            color:#ff2d75;
            font-size:1.2rem;
            padding:4px 10px;
            border-radius:8px;
            cursor:pointer;
            user-select:none;
        }
        .accordion-header .arrow:hover{background:#ff2d7510}
        .accordion.open .accordion-header .arrow{transform:rotate(180deg)}
        .accordion-body{display:none;padding:14px 18px;background:#0d0d0d}
        .accordion.open .accordion-body{display:block}
        .leaderboard{
            background:#0d0d0d;
            border-radius:14px;
            border:1px solid #2a2a2a;
            padding:16px;
            position:sticky;
            top:20px;
            align-self:start;
            max-height:calc(100vh - 180px);
            overflow-y:auto;
        }
        .leaderboard h4{color:#ff2d75;margin-bottom:12px}
        .leaderboard table{width:100%;border-collapse:collapse}
        .leaderboard th{text-align:left;color:#666;font-weight:400;font-size:.8rem;padding:6px 10px;border-bottom:1px solid #1f1f1f}
        .leaderboard td{padding:6px 10px;color:#ccc;font-size:.9rem;border-bottom:1px solid #141414}
        .leaderboard tr:last-child td{border-bottom:none}
        .leaderboard .rank{color:#ff2d75;font-weight:700;width:40px}
        .leaderboard .score{color:#ff6b9d;font-weight:600}
        .doc-text{color:#bbb;font-size:.92rem;line-height:1.7;padding:10px 0}
        .doc-text .section{color:#ff6b9d;font-weight:600;font-size:1.1rem;margin-top:16px;margin-bottom:8px}
        .doc-text .num{color:#666;font-weight:400}
        .doc-text .green{color:#66bb6a}
        .doc-text .red{color:#ef5350}
        .doc-text ul{color:#bbb;padding-left:30px;margin:4px 0 8px 0}
        .quiz-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
        .quiz-fields label{color:#aaa;font-size:.9rem;display:flex;flex-direction:column;gap:4px}
        .quiz-fields input{background:#0d0d0d;border:1px solid #2a2a2a;color:#e0e0e0;padding:10px 14px;border-radius:10px;font-size:.95rem}
        .quiz-fields input:focus{outline:none;border-color:#ff2d75}
        .btn-pink{background:#ff2d75;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer;font-size:1rem;transition:.3s}
        .btn-pink:hover{background:#ff6b9d;transform:scale(1.02)}
        .btn-pink-small{background:#ff2d75;color:#fff;border:none;padding:6px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:.8rem;transition:.3s}
        .btn-pink-small:hover{background:#ff6b9d}
        .quiz-qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
        .quiz-qa-grid input{background:#0d0d0d;border:1px solid #2a2a2a;color:#e0e0e0;padding:8px 12px;border-radius:8px;font-size:.9rem;width:100%}
        .quiz-qa-grid input:focus{outline:none;border-color:#ff2d75}
        .quiz-qa-grid .label{color:#555;font-size:.65rem;text-align:center;display:block}
        .quiz-wrap{display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:start}
        @media(max-width:768px){.quiz-wrap{grid-template-columns:1fr}}
        .info-box{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:12px;padding:14px 18px;margin-top:10px;color:#888;font-size:.85rem}
        .info-box strong{color:#ff6b9d}
        .empty-state{text-align:center;padding:40px 20px;color:#555}
        .empty-state .big-icon{font-size:3rem;display:block;margin-bottom:12px}
        .empty-state h3{color:#888;font-size:1.3rem}
        .empty-state p{color:#444;margin-top:6px}
        select{background:#0d0d0d;border:1px solid #2a2a2a;color:#e0e0e0;padding:10px 14px;border-radius:10px;font-size:.95rem;width:100%}
        select:focus{outline:none;border-color:#ff2d75}
        .mt-12{margin-top:12px}
        footer{text-align:center;padding:30px 0 10px;color:#333;font-size:.85rem;border-top:1px solid #1a1a1a;margin-top:20px}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:#0d0d0d}
        ::-webkit-scrollbar-thumb{background:#ff2d75;border-radius:10px}
        .macro-box{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:12px;padding:16px;margin-bottom:12px}
        .macro-box .macro-title{color:#ff6b9d;font-weight:600;font-size:.95rem}
        .macro-box .macro-code{color:#888;font-size:.8rem;word-break:break-all;background:#111;padding:8px 12px;border-radius:8px;margin-top:6px;font-family:monospace}
        .macro-box .macro-desc{color:#666;font-size:.75rem;margin-top:4px}
        .accordion-header .title{flex:1;cursor:default}
        .leaderboard-sticky-wrap{
            position:sticky;
            top:20px;
            align-self:start;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📰 WEAZEL NEWS helper</h1>
        <p>by billy eternal</p>
    </header>
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="main"><span>🏠</span> Главная <span class="label">• устав</span></button>
        <button class="tab-btn" data-tab="hr"><span>📗</span> Human Resources <span class="label">• кадры</span></button>
        <button class="tab-btn" data-tab="event"><span>📕</span> Event <span class="label">• мероприятия</span></button>
    </div>
    <div id="app"></div>
    <footer>Weazel News • by billy eternal • Обновлено 30.06.2026</footer>
</div>
<script>
    // ===== ГЛОБАЛЬНЫЕ ФУНКЦИИ =====
    function toggleAccordion(el){
        const accordion = el.closest('.accordion');
        accordion.classList.toggle('open');
    }

    function copyLine(btn){
        const line = btn.closest('.text-line');
        const text = line.querySelector('.line-text').textContent.trim();
        if(!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const o = btn.textContent;
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = o, 1000);
        }).catch(() => {
            const t = document.createElement('textarea');
            t.value = text;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            document.body.removeChild(t);
            const o = btn.textContent;
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = o, 1000);
        });
    }

    function copyMacro(btn){
        const code = btn.previousElementSibling?.textContent || '';
        navigator.clipboard.writeText(code).then(() => {
            alert('✅ Скопировано!');
        }).catch(() => {
            const t = document.createElement('textarea');
            t.value = code;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            document.body.removeChild(t);
            alert('✅ Скопировано!');
        });
    }

    // ===== ЗАГРУЗКА СТРАНИЦ =====
    // Автоопределение базового пути для GitHub Pages
    const basePath = window.location.pathname.replace(/\/[^/]*$/, '/');
    const pages = { 
        main: basePath + 'main.html', 
        hr: basePath + 'hr.html', 
        event: basePath + 'event.html' 
    };
    let currentPage = 'main';

    function loadPage(page) {
        const app = document.getElementById('app');
        app.innerHTML = '<div style="text-align:center;padding:40px;color:#555;">⏳ Загрузка...</div>';
        fetch(pages[page])
            .then(res => {
                if (!res.ok) throw new Error('Страница не найдена');
                return res.text();
            })
            .then(html => {
                app.innerHTML = html;
                currentPage = page;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelector(`.tab-btn[data-tab="${page}"]`).classList.add('active');
                if (page === 'event') initEvent();
                if (page === 'hr') initHR();
                if (page === 'main') initMain();
            })
            .catch(err => {
                app.innerHTML = `<div style="text-align:center;padding:40px;color:#ff6b6b;"><span style="font-size:2rem;">❌</span><p>Ошибка загрузки: ${err.message}</p></div>`;
            });
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const tab = this.dataset.tab;
            if (tab && pages[tab]) loadPage(tab);
        });
    });

    // ===== ИНИЦИАЛИЗАЦИЯ MAIN =====
    function initMain() {
        document.querySelectorAll('#main-cats .category-btn').forEach(b => {
            b.addEventListener('click', function() {
                const p = this.closest('#main-cats');
                p.querySelectorAll('.category-btn').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                const cat = this.dataset.cat;
                document.querySelectorAll('.main-cat').forEach(x => x.classList.add('hidden'));
                document.getElementById(cat).classList.remove('hidden');
            });
        });
        document.querySelectorAll('.accordion .arrow').forEach(arrow => {
            arrow.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleAccordion(this);
            });
        });
        document.querySelectorAll('.copy-btn').forEach(b => {
            b.addEventListener('click', function() {
                const line = this.closest('.text-line');
                const text = line.querySelector('.line-text').textContent.trim();
                if (!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    const o = this.textContent;
                    this.textContent = '✅';
                    setTimeout(() => this.textContent = o, 1000);
                }).catch(() => {
                    const t = document.createElement('textarea');
                    t.value = text;
                    document.body.appendChild(t);
                    t.select();
                    document.execCommand('copy');
                    document.body.removeChild(t);
                    const o = this.textContent;
                    this.textContent = '✅';
                    setTimeout(() => this.textContent = o, 1000);
                });
            });
        });
    }

    // ===== ИНИЦИАЛИЗАЦИЯ HR =====
    function initHR() {
        document.querySelectorAll('#hr-cats .category-btn').forEach(b => {
            b.addEventListener('click', function() {
                const p = this.closest('#hr-cats');
                p.querySelectorAll('.category-btn').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                const cat = this.dataset.cat;
                document.querySelectorAll('.hr-cat').forEach(x => x.classList.add('hidden'));
                document.getElementById(cat).classList.remove('hidden');
            });
        });
        document.querySelectorAll('.accordion .arrow').forEach(arrow => {
            arrow.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleAccordion(this);
            });
        });
        document.querySelectorAll('.copy-btn').forEach(b => {
            b.addEventListener('click', function() {
                const line = this.closest('.text-line');
                const text = line.querySelector('.line-text').textContent.trim();
                if (!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    const o = this.textContent;
                    this.textContent = '✅';
                    setTimeout(() => this.textContent = o, 1000);
                }).catch(() => {
                    const t = document.createElement('textarea');
                    t.value = text;
                    document.body.appendChild(t);
                    t.select();
                    document.execCommand('copy');
                    document.body.removeChild(t);
                    const o = this.textContent;
                    this.textContent = '✅';
                    setTimeout(() => this.textContent = o, 1000);
                });
            });
        });
        const startH = document.getElementById('startH');
        const startM = document.getElementById('startM');
        const endH = document.getElementById('endH');
        const endM = document.getElementById('endM');
        if(startH) startH.addEventListener('change', updateTime);
        if(startM) startM.addEventListener('change', updateTime);
        if(endH) endH.addEventListener('change', updateTime);
        if(endM) endM.addEventListener('change', updateTime);
    }

    function updateTime() {
        const h1 = document.getElementById('startH').value.padStart(2,'0');
        const m1 = document.getElementById('startM').value.padStart(2,'0');
        const h2 = document.getElementById('endH').value.padStart(2,'0');
        const m2 = document.getElementById('endM').value.padStart(2,'0');
        const l = document.querySelector('#hr-start .text-line:nth-child(5) .line-text');
        if (l) l.textContent = '⚠️ Собеседование пройдет с ' + h1 + ':' + m1 + ' до ' + h2 + ':' + m2 + '. ⚠️';
    }

    // ===== ИНИЦИАЛИЗАЦИЯ EVENT =====
    function initEvent() {
        document.querySelectorAll('#event-cats .category-btn').forEach(b => {
            b.addEventListener('click', function() {
                const p = this.closest('#event-cats');
                p.querySelectorAll('.category-btn').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                const cat = this.dataset.cat;
                document.querySelectorAll('.event-cat').forEach(x => x.classList.add('hidden'));
                document.getElementById(cat).classList.remove('hidden');
                if (cat === 'event-quiz') renderQuiz();
                if (cat === 'event-interactive') showInteractive();
            });
        });
        document.querySelectorAll('.accordion .arrow').forEach(arrow => {
            arrow.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleAccordion(this);
            });
        });
        document.querySelectorAll('.copy-btn').forEach(b => {
            b.addEventListener('click', function() {
                const line = this.closest('.text-line');
                const text = line.querySelector('.line-text').textContent.trim();
                if (!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    const o = this.textContent;
                    this.textContent = '✅';
                    setTimeout(() => this.textContent = o, 1000);
                }).catch(() => {
                    const t = document.createElement('textarea');
                    t.value = text;
                    document.body.appendChild(t);
                    t.select();
                    document.execCommand('copy');
                    document.body.removeChild(t);
                    const o = this.textContent;
                    this.textContent = '✅';
                    setTimeout(() => this.textContent = o, 1000);
                });
            });
        });
        const select = document.getElementById('interactive-select');
        if(select) select.addEventListener('change', showInteractive);
        
        const qName = document.getElementById('q-name');
        const qTopic = document.getElementById('q-topic');
        const qPrize = document.getElementById('q-prize');
        const qSponsor = document.getElementById('q-sponsor');
        if(qName) qName.addEventListener('input', renderQuiz);
        if(qTopic) qTopic.addEventListener('input', renderQuiz);
        if(qPrize) qPrize.addEventListener('input', renderQuiz);
        if(qSponsor) qSponsor.addEventListener('input', renderQuiz);
        
        renderQuiz();
        if(select && select.value) showInteractive();
    }

    // ===== ВИКТОРИНА =====
    function getLeaderboardWinner(){
        const inputs = document.querySelectorAll('.winner-input');
        const scores = {};
        inputs.forEach(el => {
            const name = el.value.trim();
            if(name && name !== 'имя победителя' && name !== 'имя'){
                if(!scores[name]) scores[name] = 0;
                scores[name] += 1;
            }
        });
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        return sorted.length > 0 ? sorted[0][0] : '[ИМЯ ПОБЕДИТЕЛЯ]';
    }

    function updateLeaderboard(){
        const inputs = document.querySelectorAll('.winner-input');
        const scores = {};
        inputs.forEach(el => {
            const name = el.value.trim();
            if(name && name !== 'имя победителя' && name !== 'имя'){
                if(!scores[name]) scores[name] = 0;
                scores[name] += 1;
            }
        });
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const tbody = document.getElementById('lb-body');
        if(!tbody) return;
        let html = '';
        for(let i = 0; i < 10; i++){
            const name = i < sorted.length ? sorted[i][0] : '—';
            const score = i < sorted.length ? sorted[i][1] : 0;
            html += '<tr><td class="rank">' + (i + 1) + '</td><td>' + name + '</td><td class="score">' + score + '</td></tr>';
        }
        tbody.innerHTML = html;
        
        const winner = getLeaderboardWinner();
        const display = document.getElementById('winner-name-display');
        if(display) display.textContent = winner;
    }

    function updateWinner(){
        updateLeaderboard();
    }

    function renderQuiz(){
        const name = document.getElementById('q-name')?.value || 'Викторина';
        const topic = document.getElementById('q-topic')?.value || 'разные темы';
        const prize = document.getElementById('q-prize')?.value || '25.000$';
        const sponsor = document.getElementById('q-sponsor')?.value.trim() || '';

        const qs = {};
        const ans = {};
        document.querySelectorAll('.q-val').forEach(el => qs[el.dataset.idx] = el.value || 'xxx');
        document.querySelectorAll('.a-val').forEach(el => ans[el.dataset.idx] = el.value || 'xxx');

        const oldWinners = {};
        document.querySelectorAll('.winner-input').forEach(el => { oldWinners[el.dataset.idx] = el.value || ''; });

        const exampleQ = 'На какой планете мы живем?';
        const exampleA = 'Земля.';

        const lines = [
            '✨Доброго времени суток, дорогие жители и гости штата!✨',

            <div class="text-line"><button class="copy-btn" onclick="copyLine(this)">📋</button><span class="line-num">3</span><span class="line-text">☄️ Наши сотрудники приглашают Вас на мероприятие..</span></div>

    function showInteractive(){
        const sel = document.getElementById('interactive-select');
        const val = sel.value;
        const c = document.getElementById('interactive-content');
        if(!val){ c.innerHTML = '<div class="empty-state"><span class="big-icon">🎯</span><h3>Выберите интерактив</h3></div>'; return; }
        c.innerHTML = interactiveTexts[val] || '<div class="empty-state"><span class="big-icon">❌</span><h3>Шаблон не найден</h3></div>';
    }

    // ===== ЗАПУСК =====
