<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weazel News Helper</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d0d;color:#e0e0e0;padding:20px}
        .container{max-width:1300px;margin:0 auto}
        header{background:linear-gradient(135deg,#1a0a0f,#2d0d1a);padding:35px;border-radius:24px;margin-bottom:30px;border:2px solid #ff2d75;text-align:center;box-shadow:0 0 60px #ff2d7520}
        header h1{font-size:2.8rem;background:linear-gradient(90deg,#ff2d75,#ff6b9d,#ff2d75);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        header p{color:#ff6b9d;margin-top:8px;font-size:1.1rem}
        .tab-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}
        .tab-btn{background:#141414;border:2px solid #2a2a2a;color:#999;padding:14px 28px;border-radius:16px;cursor:pointer;font-weight:600;transition:.3s;display:flex;align-items:center;gap:10px}
        .tab-btn:hover{background:#1f1f1f;border-color:#ff2d75;color:#fff}
        .tab-btn.active{background:#ff2d75;color:#fff;border-color:#ff2d75;box-shadow:0 0 40px #ff2d7540}
        .tab-btn .label{font-size:.75rem;color:#666;display:block;font-weight:400}
        .tab-btn.active .label{color:#ffb3cc}
        .tab-page{display:none;animation:fade .3s}
        .tab-page.active{display:block}
        @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .card{background:#141414;border-radius:20px;padding:28px;border:1px solid #2a2a2a;margin-bottom:24px;transition:.3s}
        .card:hover{border-color:#ff2d7540}
        .card h2{color:#ff2d75;font-size:1.5rem;margin-bottom:18px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #2a2a2a;padding-bottom:12px}
        .card h2 .badge{background:#ff2d7520;color:#ff6b9d;font-size:.75rem;padding:2px 14px;border-radius:20px}
        .category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
        .category-btn{background:#0d0d0d;border:2px solid #2a2a2a;border-radius:16px;padding:14px 16px;cursor:pointer;text-align:center;transition:.3s;color:#aaa;font-weight:500}
        .category-btn:hover{background:#1a1a1a;border-color:#ff2d7540;color:#fff}
        .category-btn.active{background:#ff2d7520;border-color:#ff2d75;color:#ff6b9d}
        .category-btn .cat-icon{font-size:1.6rem;display:block;margin-bottom:4px}
        .category-btn .cat-label{font-size:.8rem}
        .hidden{display:none!important}
        .level{background:#111;padding:14px 18px;border-radius:12px;margin-bottom:10px;border-left:4px solid #ff2d75}
        .level strong{color:#ff6b9d;font-size:1.05rem}
        .level .days{color:#ff2d75;font-size:.85rem;margin-left:12px;background:#ff2d7510;padding:2px 12px;border-radius:12px}
        .level ul{margin-top:6px;padding-left:20px;color:#aaa;font-size:.93rem}
        .level ul li{margin:3px 0}
        .text-block{background:#0a0a0a;border-radius:12px;border:1px solid #1f1f1f;overflow:hidden;max-height:600px;overflow-y:auto}
        .text-line{display:flex;align-items:center;gap:6px;padding:3px 6px;border-bottom:1px solid #141414;transition:.2s}
        .text-line:hover{background:#1a0a0f}
        .text-line:last-child{border-bottom:none}
        .text-line .copy-btn{background:transparent;border:none;color:#ff2d75;cursor:pointer;font-size:.8rem;padding:2px 6px;border-radius:4px;opacity:.5;flex-shrink:0;transition:.2s}
        .text-line .copy-btn:hover{background:#ff2d7520;opacity:1}
        .text-line .line-num{color:#444;font-size:.65rem;min-width:28px;text-align:right;flex-shrink:0}
        .text-line .line-text{flex:1;word-break:break-word;color:#ccc;font-size:.92rem;padding:2px 0}
        .text-line .line-text input{background:transparent;border:none;border-bottom:1px dashed #555;color:#ff6b9d;font-size:.92rem;width:auto;min-width:60px;padding:0 4px;font-family:inherit;display:inline}
        .text-line .line-text input:focus{outline:none;border-bottom-color:#ff2d75}
        .link-list{display:flex;flex-wrap:wrap;gap:10px}
        .link-list a{background:#111;padding:10px 20px;border-radius:12px;color:#ff6b9d;text-decoration:none;font-size:.92rem;border:1px solid #2a2a2a;transition:.3s}
        .link-list a:hover{background:#1a0a0f;border-color:#ff2d75;color:#ff2d75}
        .time-inputs{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
        .time-inputs label{color:#aaa;display:flex;align-items:center;gap:6px}
        .time-inputs input[type=number]{background:#0d0d0d;border:1px solid #2a2a2a;color:#fff;padding:10px 14px;border-radius:10px;width:70px;text-align:center;font-size:1.1rem}
        .time-inputs input[type=number]:focus{outline:none;border-color:#ff2d75}
        .time-inputs input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
        .accordion{background:#0d0d0d;border-radius:14px;border:1px solid #2a2a2a;margin-bottom:12px;overflow:hidden}
        .accordion-header{background:#1a1a1a;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;font-weight:600;color:#ddd;user-select:none}
        .accordion-header .arrow{display:inline-block;transition:transform .3s ease;color:#ff2d75;font-size:1.2rem;padding:4px 10px;border-radius:8px;cursor:pointer;user-select:none}
        .accordion-header .arrow:hover{background:#ff2d7510}
        .accordion.open .accordion-header .arrow{transform:rotate(180deg)}
        .accordion-body{display:none;padding:14px 18px;background:#0d0d0d}
        .accordion.open .accordion-body{display:block}
        .leaderboard{background:#0d0d0d;border-radius:14px;border:1px solid #2a2a2a;padding:16px;position:sticky;top:20px;align-self:start;max-height:calc(100vh - 180px);overflow-y:auto}
        .leaderboard h4{color:#ff2d75;margin-bottom:12px}
        .leaderboard table{width:100%;border-collapse:collapse}
        .leaderboard th{text-align:left;color:#666;font-weight:400;font-size:.8rem;padding:6px 10px;border-bottom:1px solid #1f1f1f}
        .leaderboard td{padding:6px 10px;color:#ccc;font-size:.9rem;border-bottom:1px solid #141414}
        .leaderboard tr:last-child td{border-bottom:none}
        .leaderboard .rank{color:#ff2d75;font-weight:700;width:40px}
        .leaderboard .score{color:#ff6b9d;font-weight:600}
        .doc-text{color:#bbb;font-size:.92rem;line-height:1.7;padding:10px 0}
        .doc-text .section{color:#ff6b9d;font-weight:600;font-size:1.1rem;margin-top:16px;margin-bottom:8px}
        .doc-text .num{color:#666;font-weight:400}
        .doc-text .green{color:#66bb6a}
        .doc-text .red{color:#ef5350}
        .doc-text ul{color:#bbb;padding-left:30px;margin:4px 0 8px 0}
        .quiz-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
        .quiz-fields label{color:#aaa;font-size:.9rem;display:flex;flex-direction:column;gap:4px}
        .quiz-fields input{background:#0d0d0d;border:1px solid #2a2a2a;color:#e0e0e0;padding:10px 14px;border-radius:10px;font-size:.95rem}
        .quiz-fields input:focus{outline:none;border-color:#ff2d75}
        .btn-pink{background:#ff2d75;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer;font-size:1rem;transition:.3s}
        .btn-pink:hover{background:#ff6b9d;transform:scale(1.02)}
        .btn-pink-small{background:#ff2d75;color:#fff;border:none;padding:6px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:.8rem;transition:.3s}
        .btn-pink-small:hover{background:#ff6b9d}
        .btn-gray{background:#2a2a2a;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer;font-size:1rem;transition:.3s}
        .btn-gray:hover{background:#3a3a3a}
        .btn-danger{background:#aa2d2d;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer;font-size:1rem;transition:.3s}
        .btn-danger:hover{background:#cc3333}
        .quiz-qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
        .quiz-qa-grid input{background:#0d0d0d;border:1px solid #2a2a2a;color:#e0e0e0;padding:8px 12px;border-radius:8px;font-size:.9rem;width:100%}
        .quiz-qa-grid input:focus{outline:none;border-color:#ff2d75}
        .quiz-qa-grid .label{color:#555;font-size:.65rem;text-align:center;display:block}
        .quiz-wrap{display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:start}
        @media(max-width:768px){.quiz-wrap{grid-template-columns:1fr}}
        .info-box{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:12px;padding:14px 18px;margin-top:10px;color:#888;font-size:.85rem}
        .info-box strong{color:#ff6b9d}
        .empty-state{text-align:center;padding:40px 20px;color:#555}
        .empty-state .big-icon{font-size:3rem;display:block;margin-bottom:12px}
        .empty-state h3{color:#888;font-size:1.3rem}
        .empty-state p{color:#444;margin-top:6px}
        select{background:#0d0d0d;border:1px solid #2a2a2a;color:#e0e0e0;padding:10px 14px;border-radius:10px;font-size:.95rem;width:100%}
        select:focus{outline:none;border-color:#ff2d75}
        .mt-12{margin-top:12px}
        footer{text-align:center;padding:30px 0 10px;color:#333;font-size:.85rem;border-top:1px solid #1a1a1a;margin-top:20px}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:#0d0d0d}
        ::-webkit-scrollbar-thumb{background:#ff2d75;border-radius:10px}
        .macro-box{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:12px;padding:16px;margin-bottom:12px}
        .macro-box .macro-title{color:#ff6b9d;font-weight:600;font-size:.95rem}
        .macro-box .macro-code{color:#888;font-size:.8rem;word-break:break-all;background:#111;padding:8px 12px;border-radius:8px;margin-top:6px;font-family:monospace}
        .macro-box .macro-desc{color:#666;font-size:.75rem;margin-top:4px}
        .accordion-header .title{flex:1;cursor:default}
        .leaderboard-sticky-wrap{position:sticky;top:20px;align-self:start}
        .quiz-buttons{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
        .codes-search-wrap{position:relative;margin-bottom:16px}
        .codes-search-wrap input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;color:#e0e0e0;padding:12px 16px 12px 44px;border-radius:10px;font-size:.95rem;transition:.3s}
        .codes-search-wrap input:focus{outline:none;border-color:#ff2d75}
        .codes-search-wrap .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#666;font-size:1.1rem}
        .copy-notification{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #ff2d75;color:#fff;padding:12px 24px;border-radius:12px;font-size:.95rem;z-index:9999;box-shadow:0 0 40px #ff2d7540;animation:fadeIn 0.3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .codes-matrix{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-top:12px}
        .code-card{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:14px;overflow:hidden;transition:.3s}
        .code-card:hover{border-color:#ff2d7540}
        .code-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;transition:.2s;background:#0d0d0d}
        .code-card-header:hover{background:#141414}
        .code-card-header .code-word{font-weight:700;color:#ff6b9d;font-size:.95rem;display:flex;align-items:center;gap:10px}
        .code-card-header .code-status{font-size:.7rem;padding:2px 10px;border-radius:12px;flex-shrink:0}
        .code-card-header .code-status.active{background:#66bb6a20;color:#66bb6a}
        .code-card-header .code-status.today{background:#ffd93d20;color:#ffd93d}
        .code-card-header .code-status.expired{background:#ff444420;color:#ff4444}
        .code-card-header .code-arrow{color:#555;font-size:.8rem;transition:transform .3s;margin-left:8px}
        .code-card.open .code-card-header .code-arrow{transform:rotate(180deg)}
        .code-card-body{display:none;padding:12px 14px 14px;border-top:1px solid #1a1a1a;background:#0a0a0a}
        .code-card.open .code-card-body{display:block}
        .code-card-body .code-template{color:#ccc;font-size:.88rem;line-height:1.5;margin-bottom:10px;word-break:break-word}
        .code-card-body .code-expires{color:#666;font-size:.75rem;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
        .code-card-body .code-expires .date{color:#888}
        .code-card-body .btn-copy-code{background:#ff2d75;color:#fff;border:none;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;transition:.3s;flex-shrink:0}
        .code-card-body .btn-copy-code:hover{background:#ff6b9d;transform:scale(1.02)}
        .code-card-body .btn-copy-code.copied{background:#66bb6a}
        .code-card-body .code-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .code-badge{font-size:.65rem;color:#666;background:#1a1a1a;padding:2px 10px;border-radius:10px}
        .codes-count{color:#666;font-size:.85rem;margin-left:12px;font-weight:400}
        .ref-grid-container{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        @media(max-width:900px){.ref-grid-container{grid-template-columns:1fr}}
        .ref-col{display:flex;flex-direction:column;gap:16px}
        .ref-section{background:#0d0d0d;border-radius:14px;border:1px solid #2a2a2a;overflow:hidden}
        .ref-section-header{background:#1a1a1a;padding:10px 16px;font-weight:600;color:#ddd;font-size:.95rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a2a}
        .ref-section-header .ref-count{color:#666;font-weight:400;font-size:.75rem;background:#0d0d0d;padding:2px 10px;border-radius:12px}
        .ref-search-wrap{position:relative;padding:8px 12px;background:#0a0a0a;border-bottom:1px solid #1f1f1f}
        .ref-search-wrap .search-icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:#555;font-size:.85rem}
        .ref-search-wrap input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;color:#e0e0e0;padding:6px 12px 6px 32px;border-radius:8px;font-size:.85rem;transition:.3s}
        .ref-search-wrap input:focus{outline:none;border-color:#ff2d75}
        .ref-search-wrap input::placeholder{color:#444;font-size:.8rem}
        .ref-items{padding:6px 12px;max-height:260px;overflow-y:auto;background:#0d0d0d}
        .ref-items::-webkit-scrollbar{width:4px}
        .ref-items::-webkit-scrollbar-track{background:#0d0d0d}
        .ref-items::-webkit-scrollbar-thumb{background:#ff2d75;border-radius:10px}
        .ref-item{display:flex;align-items:center;justify-content:space-between;padding:4px 6px;border-bottom:1px solid #141414;font-size:.85rem;color:#ccc;transition:.2s;gap:8px}
        .ref-item:hover{background:#1a0a0f;border-radius:6px}
        .ref-item:last-child{border-bottom:none}
        .ref-item .ref-item-text{flex:1;word-break:break-word}
        .ref-item .copy-btn-sm{background:transparent;border:none;color:#ff2d75;cursor:pointer;font-size:.7rem;padding:2px 8px;border-radius:4px;transition:.3s;flex-shrink:0;opacity:.5}
        .ref-item .copy-btn-sm:hover{background:#ff2d7520;opacity:1}
        .copy-btn-sm{background:transparent;border:none;color:#ff2d75;cursor:pointer;font-size:.7rem;padding:2px 6px;border-radius:4px;transition:.3s;flex-shrink:0}
        .copy-btn-sm:hover{background:#ff2d7520}
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📰 WeaZeL NewS HelpeR v1.1.1</h1>
        <p>by billy eternal</p>
    </header>
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="main"><span>🏠</span> Главная <span class="label">• устав</span></button>
        <button class="tab-btn" data-tab="editor"><span>📝</span> Редактура <span class="label">• кодовые слова</span></button>
        <button class="tab-btn" data-tab="hr"><span>📗</span> Human Resources <span class="label">• кадры</span></button>
        <button class="tab-btn" data-tab="event"><span>📕</span> Event <span class="label">• мероприятия</span></button>
    </div>
    <div id="app"></div>
    <footer>Weazel News • by billy eternal • Обновлено 30.06.2026</footer>
</div>

<script>
// ============================================================
//  БАЗОВЫЙ ЗАГРУЗЧИК СТРАНИЦ
// ============================================================
(function() {
    var basePath = window.location.pathname.replace(/\/[^/]*$/, '/');
    
    var pages = { 
        main: basePath + 'main.html', 
        editor: basePath + 'editor.html',
        hr: basePath + 'hr.html', 
        event: basePath + 'event.html' 
    };

    var loadedScripts = {};
    var initFunctions = {
        main: 'initMain',
        editor: 'initEditor',
        hr: 'initHR',
        event: 'initEvent'
    };
    var scriptMap = {
        main: 'main.js',
        editor: 'editor.js',
        hr: 'hr.js',
        event: 'event.js'
    };

    function loadPage(page) {
        var app = document.getElementById('app');
        app.innerHTML = '<div style="text-align:center;padding:40px;color:#555;">⏳ Загрузка...</div>';
        
        fetch(pages[page])
            .then(function(res) {
                if (!res.ok) throw new Error('Страница не найдена (404)');
                return res.text();
            })
            .then(function(html) {
                app.innerHTML = html;
                
                document.querySelectorAll('.tab-btn').forEach(function(b) { 
                    b.classList.remove('active'); 
                });
                var activeBtn = document.querySelector('.tab-btn[data-tab="' + page + '"]');
                if (activeBtn) activeBtn.classList.add('active');
                
                loadScript(page);
                localStorage.setItem('activeTab', page);
            })
            .catch(function(err) {
                app.innerHTML = '<div style="text-align:center;padding:40px;color:#ff6b6b;"><span style="font-size:2rem;">❌</span><p>Ошибка загрузки: ' + err.message + '</p><p style="color:#666;font-size:.85rem;margin-top:8px;">Файл ' + pages[page] + ' не найден.</p></div>';
            });
    }

    function loadScript(page) {
        if (loadedScripts[page]) {
            callInit(page);
            return;
        }
        
        var script = document.createElement('script');
        script.src = basePath + scriptMap[page];
        script.onload = function() {
            loadedScripts[page] = true;
            callInit(page);
        };
        script.onerror = function() {
            console.error('Ошибка загрузки скрипта: ' + scriptMap[page]);
            // Пробуем еще раз через 500ms
            setTimeout(function() {
                var retryScript = document.createElement('script');
                retryScript.src = basePath + scriptMap[page] + '?t=' + Date.now();
                retryScript.onload = function() {
                    loadedScripts[page] = true;
                    callInit(page);
                };
                document.head.appendChild(retryScript);
            }, 500);
        };
        document.head.appendChild(script);
    }

    function callInit(page) {
        var funcName = initFunctions[page];
        if (typeof window[funcName] === 'function') {
            try {
                window[funcName]();
            } catch(e) {
                console.error('Ошибка в ' + funcName + ':', e);
                // Если ошибка, пробуем еще раз через 300ms
                setTimeout(function() {
                    if (typeof window[funcName] === 'function') {
                        try {
                            window[funcName]();
                        } catch(e2) {
                            console.error('Повторная ошибка в ' + funcName + ':', e2);
                        }
                    }
                }, 300);
            }
        } else {
            console.warn('Функция ' + funcName + ' не найдена, повторная попытка...');
            setTimeout(function() {
                if (typeof window[funcName] === 'function') {
                    window[funcName]();
                }
            }, 500);
        }
    }

    // Переключение вкладок
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var tab = this.dataset.tab;
            if (tab && pages[tab]) loadPage(tab);
        });
    });

    // Загрузка сохраненной вкладки
    window.addEventListener('DOMContentLoaded', function() {
        var savedTab = localStorage.getItem('activeTab') || 'main';
        document.querySelectorAll('.tab-btn').forEach(function(b) {
            b.classList.toggle('active', b.dataset.tab === savedTab);
        });
        loadPage(savedTab);
    });

    // Глобальные функции
    window.toggleAccordion = function(el) {
        var accordion = el.closest('.accordion');
        if (accordion) accordion.classList.toggle('open');
    };

    window.copyLine = function(btn) {
        var line = btn.closest('.text-line');
        if (!line) return;
        var textElement = line.querySelector('.line-text');
        if (!textElement) return;
        var text = textElement.textContent.trim();
        var input = textElement.querySelector('input');
        if (input) {
            var inputValue = input.value.trim() || input.placeholder || 'имя';
            var childNodes = textElement.childNodes;
            var beforeInput = '', afterInput = '';
            var foundInput = false;
            for (var i = 0; i < childNodes.length; i++) {
                if (childNodes[i].nodeType === 3) {
                    if (!foundInput) beforeInput += childNodes[i].textContent;
                    else afterInput += childNodes[i].textContent;
                } else if (childNodes[i].nodeType === 1 && childNodes[i].tagName === 'INPUT') {
                    foundInput = true;
                } else if (childNodes[i].nodeType === 1) {
                    if (!foundInput) beforeInput += childNodes[i].textContent;
                    else afterInput += childNodes[i].textContent;
                }
            }
            text = (beforeInput + inputValue + afterInput).trim();
        }
        if (!text) return;
        
        var originalText = btn.textContent;
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = '✅';
            btn.style.color = '#66bb6a';
            setTimeout(function() { 
                btn.textContent = originalText; 
                btn.style.color = '#ff2d75'; 
            }, 1500);
        }).catch(function() {
            var t = document.createElement('textarea');
            t.value = text;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            document.body.removeChild(t);
            btn.textContent = '✅';
            btn.style.color = '#66bb6a';
            setTimeout(function() { 
                btn.textContent = originalText; 
                btn.style.color = '#ff2d75'; 
            }, 1500);
        });
    };

    window.copyRefItem = function(text, btn) {
        var originalText = btn.textContent;
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = '✅';

                btn.textContent = originalText;

            }, 1500);
        });
    };

    window.copyMacro = function(btn) {
        var code = btn.previousElementSibling?.textContent || '';
        var originalText = btn.textContent;
        navigator.clipboard.writeText(code).then(function() {
            btn.textContent = '✅';
            btn.style.color = '#66bb6a';
            setTimeout(function() { 
                btn.textContent = originalText; 
                btn.style.color = '#fff'; 
            }, 1500);
        }).catch(function() {
            var t = document.createElement('textarea');
            t.value = code;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            document.body.removeChild(t);
            btn.textContent = '✅';
            btn.style.color = '#66bb6a';
            setTimeout(function() { 
                btn.textContent = originalText; 
                btn.style.color = '#fff'; 
            }, 1500);
        });
    };

    window.escapeHtml = function(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    };

    window.escapeJs = function(text) {
        return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
    };
